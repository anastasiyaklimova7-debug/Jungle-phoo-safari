<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>In the jungle</title>
    <style>
        body {
            margin: 0;
            padding: 10px;
            box-sizing: border-box;
            height: 100vh;
            overflow: hidden; /* Полностью убираем любые скроллбары */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ecf0f1;
        }

        h1 {
            margin: 5px 0;
            font-size: 26px;
        }

        .instructions {
            background-color: #34495e;
            padding: 10px 20px;
            border-radius: 12px;
            margin-bottom: 10px;
            max-width: 800px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            font-size: 15px;
        }

        .control-btn {
            background-color: #8e44ad;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 10px;
            transition: background 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        .control-btn:hover {
            background-color: #9b59b6;
        }

        #message-box {
            position: absolute;
            top: 20px;
            left: 20px; 
            transform: none; 
            background-color: rgba(44, 62, 80, 0.95);
            color: #f1c40f; 
            padding: 15px 30px;
            border-radius: 12px;
            border: 2px solid #f1c40f;
            font-size: 26px;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.8);
            opacity: 0;
            pointer-events: none; 
            transition: opacity 0.3s ease-in-out;
            z-index: 100; 
            text-align: left; 
            min-width: 300px;
        }
        #message-box.visible {
            opacity: 1;
        }

        #game-container {
            position: relative;
            display: flex; /* Контейнер плотно облегает дочернюю картинку */
            justify-content: center;
            align-items: center;
            cursor: none; 
        }

        #main-image {
            display: block;
            /* Те самые относительные размеры для идеальной адаптивности: */
            max-width: 95vw;
            max-height: 65vh;
            width: auto;
            height: auto;
            /* Картинка сохраняет пропорции 1792 / 1024 благодаря встроенному соотношению сторон */
            user-select: none;
            filter: brightness(60%); 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #hotspots-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 5; 
        }

        .hotspot {
            position: absolute;
            transform: translate(-50%, -50%);
            border-radius: 50%; 
            cursor: pointer;
            background-color: transparent; 
        }

        body.show-zones #game-container {
            cursor: default; 
        }
        body.show-zones #camera-assembly,
        body.show-zones #minimap {
            display: none;
        }
        body.show-zones .hotspot {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        body.show-zones .hotspot::after {
            content: attr(data-id);
            color: #000;
            font-weight: bold;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.95);
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            pointer-events: none; 
        }

        #camera-assembly {
            position: absolute;
            top: 0;
            left: 0;
            /* Увеличенный адаптивный размер камеры: до 550px на ПК и до 90% ширины картинки на смартфонах */
            width: min(550px, 90%); 
            aspect-ratio: 1792 / 1024;
            pointer-events: none;
            will-change: transform;
            z-index: 10;
        }

        #camera-screen {
            position: absolute;
            z-index: 11;
            left: 12%;   
            top: 17%;    
            width: 76%;  
            height: 66%; 
            background-image: url('https://i.postimg.cc/ZKVgH9hB/Gemini-Generated-Image-sgesx3sgesx3sges.png');
            background-repeat: no-repeat;
            border-radius: 15%; 
            overflow: hidden;
            will-change: background-position, background-size;
        }

        #camera-body {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 12; 
        }

        #crosshair {
            position: absolute;
            top: 56%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            z-index: 13;
        }
        #crosshair::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 4px;
            height: 4px;
            background-color: red;
            border-radius: 50%;
        }

        #minimap {
            position: absolute;
            z-index: 20;
            top: 20px; 
            right: 20px; 
            /* Адаптивный размер миникарты */
            width: max(80px, 15%); 
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px;
            overflow: hidden;
            pointer-events: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            background-color: #000;
        }
        #minimap img {
            display: block;
            width: 100%;
            height: auto;
        }
        #minimap-frame {
            position: absolute;
            top: 0; 
            left: 0;
            border: 2px solid red;
            box-sizing: border-box;
            background-color: rgba(255, 0, 0, 0.1);
            will-change: transform;
        }
    </style>
</head>
<body>

    <h1>In the jungle</h1>
    <div class="instructions">
        <strong>How to play:</strong> Find the animals and make sentences with <em>this, that, these, those</em>. For example: <em>"This is a monkey."</em>
    </div>

    <button id="toggle-zones-btn" class="control-btn">Show hints</button>

    <div id="game-container">
        <div id="message-box"></div>
        <div id="hotspots-container"></div>

        <img id="main-image" src="https://i.postimg.cc/ZKVgH9hB/Gemini-Generated-Image-sgesx3sgesx3sges.png" alt="Джунгли">
        
        <div id="camera-assembly">
            <div id="camera-screen"></div>
            <img id="camera-body" src="https://i.postimg.cc/44jStnTN/Chat-GPT-Image-16-iul-2026-g-23-45-37.png" alt="Камера">
            <div id="crosshair"></div>
        </div>

        <div id="minimap">
            <img src="https://i.postimg.cc/ZKVgH9hB/Gemini-Generated-Image-sgesx3sgesx3sges.png" alt="Миникарта">
            <div id="minimap-frame"></div>
        </div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const mainImg = document.getElementById('main-image');
        const cameraAssembly = document.getElementById('camera-assembly');
        const cameraScreen = document.getElementById('camera-screen');
        const minimap = document.getElementById('minimap');
        const minimapFrame = document.getElementById('minimap-frame');
        
        const toggleZonesBtn = document.getElementById('toggle-zones-btn');
        const messageBox = document.getElementById('message-box');
        const hotspotsContainer = document.getElementById('hotspots-container');

        const ZOOM = 1.15;

        let camW = 0, camH = 0;
        let messageTimeout;

        const animals = [
            { id: "butterflies", text: "These are butterflies.", x: 92, y: 80, size: 6 },
            { id: "elephant", text: "This is an elephant.", x: 60, y: 75, size: 14 },
            { id: "lizards", text: "Those are lizards.", x: 45, y: 82, size: 6 },
            { id: "flamingoes", text: "Those are flamingoes.", x: 35, y: 65, size: 8 },
            { id: "crocodile", text: "That is a crocodile.", x: 40, y: 50, size: 12 },
            { id: "zebras", text: "Those are zebras.", x: 55, y: 40, size: 10 },
            { id: "parrot", text: "This is a parrot.", x: 65, y: 30, size: 6 },
            { id: "giraffe", text: "That is a giraffe.", x: 90, y: 45, size: 8 }, 
            { id: "snakes", text: "These are snakes.", x: 50, y: 15, size: 8 },
            { id: "frogs", text: "These are frogs.", x: 20, y: 90, size: 5 },
            { id: "monkey", text: "This is a monkey.", x: 25, y: 55, size: 8 },
            { id: "tiger", text: "That is a tiger.", x: 10, y: 65, size: 10 }
        ];

        animals.forEach(animal => {
            const spot = document.createElement('div');
            spot.classList.add('hotspot');
            spot.style.left = animal.x + '%';
            spot.style.top = animal.y + '%';
            spot.style.width = animal.size + '%';
            spot.style.height = animal.size + '%'; 
            spot.dataset.id = animal.id;
            
            spot.addEventListener('mousedown', (e) => {
                messageBox.textContent = animal.text;
                messageBox.classList.add('visible');
                
                clearTimeout(messageTimeout);
                messageTimeout = setTimeout(() => {
                    messageBox.classList.remove('visible');
                }, 4000);
                
                e.stopPropagation();
            });

            // Поддержка касаний для мобильных устройств
            spot.addEventListener('touchstart', (e) => {
                messageBox.textContent = animal.text;
                messageBox.classList.add('visible');
                clearTimeout(messageTimeout);
                messageTimeout = setTimeout(() => {
                    messageBox.classList.remove('visible');
                }, 4000);
                e.stopPropagation();
            }, {passive: true});
            
            hotspotsContainer.appendChild(spot);
        });

        toggleZonesBtn.addEventListener('click', () => {
            document.body.classList.toggle('show-zones');
            if(document.body.classList.contains('show-zones')) {
                toggleZonesBtn.textContent = "Hide hints";
            } else {
                toggleZonesBtn.textContent = "Show hints";
            }
        });

        function initCamera() {
            camW = cameraAssembly.offsetWidth;
            camH = cameraAssembly.offsetHeight;
            
            const rect = mainImg.getBoundingClientRect();
            if (rect.width > 0) {
                // Центрируем камеру при инициализации
                updateCamera({
                    clientX: rect.left + rect.width / 2,
                    clientY: rect.top + rect.height / 2
                });
            }
        }

        function updateCamera(e) {
            const rect = mainImg.getBoundingClientRect();
            
            // Поддержка как мыши, так и тач-событий
            let clientX = e.clientX;
            let clientY = e.clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
                // Предотвращаем скролл экрана при ведении пальцем по камере
                e.preventDefault(); 
            } else if (clientX === undefined) {
                return; // Безопасный выход, если событие не содержит координат
            }

            let x = clientX - rect.left;
            let y = clientY - rect.top;

            // Ограничиваем координаты границами картинки
            x = Math.max(0, Math.min(x, rect.width));
            y = Math.max(0, Math.min(y, rect.height));

            // Сдвиг самой камеры (сборки) относительно курсора
            const moveX = x - (camW / 2);
            const moveY = y - (camH / 2);
            cameraAssembly.style.transform = `translate3d(${moveX}px, ${moveY}px, 0)`;

            // Обновление фона "экрана" камеры для создания эффекта зума
            const bgWidth = rect.width * ZOOM;
            const bgHeight = rect.height * ZOOM;
            cameraScreen.style.backgroundSize = `${bgWidth}px ${bgHeight}px`;

            const localScreenW = camW * 0.76;
            const localScreenH = camH * 0.66;
            
            const bgPosX = (localScreenW / 2) - (x * ZOOM);
            const bgPosY = (localScreenH / 2) - (y * ZOOM);
            
            cameraScreen.style.backgroundPosition = `${bgPosX}px ${bgPosY}px`;

            // Обновление положения рамки на миникарте
            const scaleX = minimap.offsetWidth / rect.width;
            const scaleY = minimap.offsetHeight / rect.height;

            const frameWidth = (rect.width / ZOOM) * scaleX;
            const frameHeight = (rect.height / ZOOM) * scaleY;
            
            minimapFrame.style.width = frameWidth + 'px';
            minimapFrame.style.height = frameHeight + 'px';

            const frameX = (x * scaleX - frameWidth / 2);
            const frameY = (y * scaleY - frameHeight / 2);
            minimapFrame.style.transform = `translate3d(${frameX}px, ${frameY}px, 0)`;
        }

        container.addEventListener('mousemove', updateCamera);
        // Обработчики для Touch-устройств (с passive: false для работы preventDefault)
        container.addEventListener('touchmove', updateCamera, {passive: false});
        container.addEventListener('touchstart', updateCamera, {passive: false});
        
        window.addEventListener('resize', initCamera);
        
        // Используем событие load на картинке, чтобы гарантировать правильные размеры
        mainImg.addEventListener('load', initCamera);
        // Подстраховка: если картинка уже в кеше
        if (mainImg.complete) {
            initCamera();
        }
    </script>
</body>
</html>
